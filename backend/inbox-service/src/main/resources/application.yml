server:
  port: ${INBOX_SERVICE_PORT:8080}

spring:
  application:
    name: inbox-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:omnicare}
    username: ${POSTGRES_USER:omnicare}
    password: ${POSTGRES_PASSWORD:change-me-local-only}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${INBOX_KAFKA_GROUP_ID:inbox-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

security:
  token:
    secret: ${JWT_SECRET:replace-with-a-long-random-local-secret}
    ttl-seconds: ${JWT_TTL_SECONDS:86400}

app:
  cors:
    allowed-origins: ${FRONTEND_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  kafka:
    consumers:
      enabled: ${INBOX_KAFKA_CONSUMERS_ENABLED:true}
  outbox:
    publisher:
      enabled: ${INBOX_OUTBOX_PUBLISHER_ENABLED:true}
      fixed-delay-ms: ${INBOX_OUTBOX_PUBLISHER_FIXED_DELAY_MS:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{correlationId:-}]"
