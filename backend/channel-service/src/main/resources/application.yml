server:
  port: ${CHANNEL_SERVICE_PORT:8081}

spring:
  application:
    name: channel-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${CHANNEL_KAFKA_GROUP_ID:channel-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  kafka:
    consumers:
      enabled: ${CHANNEL_KAFKA_CONSUMERS_ENABLED:true}
    retry:
      max-attempts: ${KAFKA_CONSUMER_RETRY_MAX_ATTEMPTS:3}
      backoff-ms: ${KAFKA_CONSUMER_RETRY_BACKOFF_MS:1000}
  redis:
    dedup-ttl-seconds: ${REDIS_DEDUP_TTL_SECONDS:86400}
  facebook:
    mode: ${FACEBOOK_MODE:simulator}
    page-id: ${FACEBOOK_PAGE_ID:local-page-id}
    app-secret: ${FACEBOOK_APP_SECRET:}
    verify-token: ${FACEBOOK_VERIFY_TOKEN:}
    page-access-token: ${FACEBOOK_PAGE_ACCESS_TOKEN:}
    graph-api-base-url: ${FACEBOOK_GRAPH_API_BASE_URL:https://graph.facebook.com/v20.0}
  email:
    mode: ${EMAIL_MODE:simulator}
    mailbox: ${EMAIL_MAILBOX:demo@example.test}
    imap:
      enabled: ${EMAIL_IMAP_ENABLED:false}
      host: ${IMAP_HOST:localhost}
      port: ${IMAP_PORT:1143}
      username: ${IMAP_USERNAME:demo@example.test}
      password: ${IMAP_PASSWORD:}
      folder: ${IMAP_FOLDER:INBOX}
      protocol: ${IMAP_PROTOCOL:imap}
      poll-fixed-delay-ms: ${IMAP_POLL_FIXED_DELAY_MS:10000}
      max-messages-per-poll: ${IMAP_MAX_MESSAGES_PER_POLL:10}
    smtp:
      enabled: ${EMAIL_SMTP_ENABLED:true}
    mail-from: ${MAIL_FROM:demo@example.test}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{correlationId:-}]"
