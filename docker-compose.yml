name: ${COMPOSE_PROJECT_NAME:-vdt2026}

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-vdt2026}-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omnicare}
      POSTGRES_USER: ${POSTGRES_USER:-omnicare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-vdt2026}-redis
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    container_name: ${COMPOSE_PROJECT_NAME:-vdt2026}-kafka
    ports:
      - "${KAFKA_HOST_PORT:-29092}:29092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 12

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: ${COMPOSE_PROJECT_NAME:-vdt2026}-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"

  inbox-service:
    build:
      context: ./backend/inbox-service
    image: ${COMPOSE_PROJECT_NAME:-vdt2026}-inbox-service:local
    container_name: ${COMPOSE_PROJECT_NAME:-vdt2026}-inbox-service
    environment:
      INBOX_SERVICE_PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-omnicare}
      POSTGRES_USER: ${POSTGRES_USER:-omnicare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_RETRY_MAX_ATTEMPTS: ${KAFKA_CONSUMER_RETRY_MAX_ATTEMPTS:-3}
      KAFKA_CONSUMER_RETRY_BACKOFF_MS: ${KAFKA_CONSUMER_RETRY_BACKOFF_MS:-1000}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-local-secret}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-86400}
      FRONTEND_ALLOWED_ORIGINS: ${FRONTEND_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      INBOX_KAFKA_CONSUMERS_ENABLED: ${INBOX_KAFKA_CONSUMERS_ENABLED:-true}
      INBOX_OUTBOX_PUBLISHER_ENABLED: ${INBOX_OUTBOX_PUBLISHER_ENABLED:-true}
      INBOX_OUTBOX_PUBLISHER_FIXED_DELAY_MS: ${INBOX_OUTBOX_PUBLISHER_FIXED_DELAY_MS:-5000}
    ports:
      - "${INBOX_SERVICE_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  channel-service:
    build:
      context: ./backend/channel-service
    image: ${COMPOSE_PROJECT_NAME:-vdt2026}-channel-service:local
    container_name: ${COMPOSE_PROJECT_NAME:-vdt2026}-channel-service
    environment:
      CHANNEL_SERVICE_PORT: 8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DEDUP_TTL_SECONDS: ${REDIS_DEDUP_TTL_SECONDS:-86400}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_RETRY_MAX_ATTEMPTS: ${KAFKA_CONSUMER_RETRY_MAX_ATTEMPTS:-3}
      KAFKA_CONSUMER_RETRY_BACKOFF_MS: ${KAFKA_CONSUMER_RETRY_BACKOFF_MS:-1000}
      CHANNEL_KAFKA_CONSUMERS_ENABLED: ${CHANNEL_KAFKA_CONSUMERS_ENABLED:-true}
      FACEBOOK_MODE: ${FACEBOOK_MODE:-simulator}
      FACEBOOK_PAGE_ID: ${FACEBOOK_PAGE_ID:-local-page-id}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      FACEBOOK_VERIFY_TOKEN: ${FACEBOOK_VERIFY_TOKEN:-}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${FACEBOOK_PAGE_ACCESS_TOKEN:-}
      FACEBOOK_GRAPH_API_BASE_URL: ${FACEBOOK_GRAPH_API_BASE_URL:-https://graph.facebook.com/v20.0}
      EMAIL_MODE: ${EMAIL_MODE:-simulator}
      EMAIL_MAILBOX: ${EMAIL_MAILBOX:-demo@example.test}
      EMAIL_IMAP_ENABLED: ${EMAIL_IMAP_ENABLED:-false}
      IMAP_HOST: ${IMAP_HOST:-localhost}
      IMAP_PORT: ${IMAP_PORT:-1143}
      IMAP_USERNAME: ${IMAP_USERNAME:-demo@example.test}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
      IMAP_FOLDER: ${IMAP_FOLDER:-INBOX}
      IMAP_PROTOCOL: ${IMAP_PROTOCOL:-imap}
      IMAP_POLL_FIXED_DELAY_MS: ${IMAP_POLL_FIXED_DELAY_MS:-10000}
      IMAP_MAX_MESSAGES_PER_POLL: ${IMAP_MAX_MESSAGES_PER_POLL:-10}
      SMTP_HOST: ${CHANNEL_SMTP_HOST:-mailpit}
      SMTP_PORT: ${CHANNEL_SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_STARTTLS_ENABLE: ${SMTP_STARTTLS_ENABLE:-false}
      SMTP_STARTTLS_REQUIRED: ${SMTP_STARTTLS_REQUIRED:-false}
      SMTP_SSL_ENABLE: ${SMTP_SSL_ENABLE:-false}
      EMAIL_SMTP_ENABLED: ${EMAIL_SMTP_ENABLED:-true}
      MAIL_FROM: ${MAIL_FROM:-demo@example.test}
      MAIL_REPLY_TO: ${MAIL_REPLY_TO:-${MAIL_FROM:-demo@example.test}}
    ports:
      - "${CHANNEL_SERVICE_PORT:-8081}:8081"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    image: ${COMPOSE_PROJECT_NAME:-vdt2026}-frontend:local
    container_name: ${COMPOSE_PROJECT_NAME:-vdt2026}-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      inbox-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
